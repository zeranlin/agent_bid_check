rule_id: R-005
rule_name: 赠品及无关商品禁入评分识别
rule_version: 2
status: active

owner:
  reviewer: M
  implementer: T

source:
  origin_type: business_rule
  origin_desc: 评审规则要求不得提供赠品、回扣或与采购无关的其他商品、服务
  created_date: 2026-04-02
  last_updated_date: 2026-04-03

classification:
  category: scoring_compliance
  rule_type: risk_detection
  target_level: formal
  severity: high

summary:
  business_goal: 识别通过无关商品、无关服务、办公设备配置、会议保障等隐性附加内容获取评分优势的场景
  reviewer_note: R-005 保留总类/隐性变体口径；显性“赠送非项目物资”场景已拆分为独立规则 R-008 优先治理

trigger_conditions:
  all_of:
    - 规则侧命中不得提供赠品或与采购无关商品服务
    - 评分项命中办公设备配置、会议保障或其他与采购无关的隐性附加服务内容
    - 上述内容与得分直接挂钩
  any_of:
    - comparison.failure_reason_codes 命中 gifts_or_unrelated_goods_in_scoring_forbidden

exclude_conditions:
  any_of:
    - 仅承诺正常售后响应时间
    - 相关商品本身属于采购标的
    - 命中显性“赠送台式电脑、打印机、办公设备、礼品、值班室物资”等非项目物资条款，此类场景优先归入 R-008

downgrade_conditions:
  any_of:
    - 服务内容与采购标的存在弱相关性，需进一步人工核边界

output:
  formal_title: 将无关商品或无关服务作为评分条件，存在不当附加交易和评审合规风险
  pending_title: 评分项可能引入无关商品或无关服务，建议人工复核
  excluded_title: 相关表述未构成无关商品或无关服务评分，不构成正式风险
  formal_description: 评分条件通过办公设备配置、会议保障等与采购无直接关联的隐性附加内容换取加分，属于不当附加交易条件。
  remediation_advice: 删除无关商品或无关服务加分条件，仅保留与采购标的直接相关的能力评价指标。

formal_admission:
  family_key: unrelated_goods_scoring
  canonical_title: 将无关商品或无关服务作为评分条件，存在不当附加交易和评审合规风险
  allow_formal: true
  requires_hard_evidence: true

evidence_hints:
  keywords:
    - 不得要求提供赠品
    - 办公设备配置
    - 会议保障
  sections:
    - 评分内容
    - 商务评分

boundary_relation:
  role: parent_rule
  child_rules:
    - R-008
  boundary_note:
    - R-005 负责“赠品、回扣或者与采购无关的其他商品、服务”总类规则中的隐性变体和泛化边界
    - R-008 负责显性“赠送非项目物资”条款，命中时优先按 R-008 输出与验收
  shared_implementation:
    compare_rule_code: gifts_or_unrelated_goods_in_scoring_forbidden
    implementation_note: 当前 compare 规则码由 R-005 / R-008 共用，显性命中由 R-008 标题治理，隐性办公设备/会议保障变体仍归 R-005 追踪

samples:
  positive:
    - data/examples/rules/R-005/positive-01.json
  negative:
    - data/examples/rules/R-005/negative-01.json
  replay:
    - data/examples/rules/R-005/replay-01.json

tests:
  unit:
    - tests/test_v2_topics_eval.py
    - tests/test_v2_compare.py
    - tests/test_v2_regression_eval.py
  replay:
    - tests/test_w002_real_file.py
  report:
    - tests/test_v2_web_compat.py

task_refs:
  remediation_tasks:
    - docs/tasks/R-005.md
  followup_tasks:
    - docs/tasks/W-002.md
    - docs/tasks/W-003.md
  acceptance_records:
    - docs/v2-remediation-tracker.md

activation:
  approved_by: M
  approved_date: 2026-04-02
  effective_scope:
    - mature
    - web
    - report

history:
  - version: 1
    date: 2026-04-02
    change: G-003 首批规则迁移入库
    author: T
  - version: 2
    date: 2026-04-03
    change: 为 R-008 显性赠送非项目物资规则拆分治理边界，R-005 保留总类/隐性变体口径
    author: T
