rule_id: R-004
rule_name: 付款方式禁入评分识别
rule_version: 2
status: active

owner:
  reviewer: M
  implementer: T

source:
  origin_type: business_rule
  origin_desc: 评审规则要求不得将付款方式作为评审因素
  created_date: 2026-04-02
  last_updated_date: 2026-04-03

classification:
  category: scoring_compliance
  rule_type: risk_detection
  target_level: formal
  severity: high

summary:
  business_goal: 识别付款周期、预付款比例、付款节点进入评分因素的场景
  reviewer_note: 合同付款条款本身不应误判为评分违规

trigger_conditions:
  all_of:
    - 规则侧命中不得将付款方式作为评审因素
    - 评分项命中付款周期、预付款比例或付款节点
    - 付款条件与得分或加分直接挂钩
  any_of:
    - comparison.failure_reason_codes 命中 payment_terms_in_scoring_forbidden

exclude_conditions:
  any_of:
    - 付款安排仅出现在合同商务条款
    - 文中仅出现付款字样，但未进入评分内容

downgrade_conditions:
  any_of:
    - 仅体现付款偏离说明，未形成评分加分条件

output:
  formal_title: 将付款方式纳入评审因素，违反评审规则合规性要求
  pending_title: 付款方式可能进入评分因素，建议人工复核
  excluded_title: 付款安排未进入评分因素，不构成正式风险
  formal_description: 评分标准将付款周期、预付款比例或付款节点与加分直接挂钩，违反付款方式不得纳入评分的规则要求。
  remediation_advice: 将付款方式相关内容移出评分项，统一作为合同商务条款约定。

evidence_hints:
  keywords:
    - 不得将付款方式作为评审因素
    - 付款周期
    - 预付款比例
    - 最高加20分
  sections:
    - 商务评分
    - 评审标准
    - 合同条款偏离表

samples:
  positive:
    - data/examples/rules/R-004/positive-01.json
  negative:
    - data/examples/rules/R-004/negative-01.json
  replay:
    - data/examples/rules/R-004/replay-01.json

tests:
  unit:
    - tests/test_v2_topics_eval.py
    - tests/test_v2_compare.py
    - tests/test_v2_regression_eval.py
  replay:
    - tests/test_w002_real_file.py
  report:
    - tests/test_v2_web_compat.py

task_refs:
  remediation_tasks:
    - docs/tasks/R-004.md
  followup_tasks:
    - docs/tasks/W-002.md
    - docs/tasks/W-003.md
  acceptance_records:
    - docs/v2-remediation-tracker.md

activation:
  approved_by: M
  approved_date: 2026-04-02
  effective_scope:
    - mature
    - web
    - report

history:
  - version: 1
    date: 2026-04-02
    change: G-003 首批规则迁移入库
    author: T
  - version: 2
    date: 2026-04-03
    change: R-004-F 补强真实表达“付款周期短于招标文件要求 / 预付款比例更有利于采购人资金安排”回放基线与专项测试
    author: T
