registry_overrides:
  - rule_id: R-001
    family_key: import_consistency
    canonical_title: 拒绝进口 vs 外标/国外部件引用矛盾风险
    requires_hard_evidence: true
  - rule_id: R-003
    family_key: acceptance_scheme_scoring
    canonical_title: 将项目验收方案纳入评审因素，违反评审规则合规性要求
    requires_hard_evidence: true
  - rule_id: R-006
    family_key: certification_scoring_bundle
    canonical_title: 以特定认证及特定发证机构作为评分条件，存在倾向性评分和限制竞争风险
    requires_hard_evidence: true
  - rule_id: R-007
    family_key: acceptance_testing_cost
    canonical_title: 验收检测及相关部门验收费用表述笼统，存在费用边界不清和潜在转嫁风险
    requires_hard_evidence: true

