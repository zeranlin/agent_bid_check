ledger_id: V2-REAL-REPLAY-CLOSURE-001
single_source: docs/trackers
owner: M
maintainer: T
purpose: >
  统一管理真实文件回放问题，从“问题识别 -> 根因定位 -> 整改任务 -> 回放验证 -> 验收回写”
  形成问题级闭环，不再依赖口头记忆和临时整理。

fields_definition:
  problem_type:
    allowed_values: ["误报", "漏报", "错层", "重复", "风险文案偏差", "规则归属错误", "证据映射错误"]
  root_cause_layer:
    allowed_values: ["compare", "output_governance", "risk_admission", "assembler_web"]
  target_action:
    allowed_values: ["删除", "下沉", "升格", "改写", "拆分", "合并"]
  acceptance_status:
    allowed_values: ["待下发", "整改中", "待验收", "已通过", "未通过", "已关闭"]
  rule_ids_note: >
    若问题已有正式规则归属，则填写正式规则编号；若问题属于治理/映射类问题且暂无正式规则，
    统一填写“无正式规则”，并在 root_cause_tags 中补充治理标签。

acceptance_baseline_template:
  required_fields:
    - 当前风险标题
    - 当前层级
    - M复核结论
    - 目标动作
    - 根因层级
    - 对应规则编号
    - 对应任务单编号
    - 验收状态
    - 验证通过回放

